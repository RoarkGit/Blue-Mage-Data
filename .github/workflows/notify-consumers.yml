name: Notify consumers

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Strago submodule update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CONSUMER_REPOS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/RoarkGit/Strago/dispatches \
            -d '{"event_type":"blue-mage-data-updated"}'
      - name: Trigger Blue-Academy submodule update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.CONSUMER_REPOS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/RoarkGit/Blue-Academy/dispatches \
            -d '{"event_type":"blue-mage-data-updated"}'
